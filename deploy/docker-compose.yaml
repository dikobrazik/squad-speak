services:
    nginx:
        image: ghcr.io/dikobrazik/squad-speak-nginx:latest
        container_name: modseccrs
        environment:
            MODSEC_AUDIT_LOG: /var/log/modsec/audit.log
            MODSEC_DEBUG_LOG: /var/log/modsec/debug.log
            SSL_CERT: /etc/letsencrypt/live/squadspeak.ru/fullchain.pem
            SSL_CERT_KEY: /etc/letsencrypt/live/squadspeak.ru/privkey.pem
            MANUAL_MODE: 1
        ports:
            - '80:8080'
            - '443:8443'
        volumes:
            - /etc/letsencrypt:/etc/letsencrypt
            - shared-volume:/var/tmp/shared-docker
            - /var/www/certbot:/var/www/certbot
            - /home/actions/squad-speak/frontend/.next/static:/usr/share/nginx/html/_next/static
            - /home/actions/squad-speak/frontend/public:/usr/share/nginx/html/public
            - /home/actions/log/nginx:/var/log/nginx
            - /home/actions/log/modsec:/var/log/modsec
        restart: always
        networks:
            - public
        depends_on:
            - frontend
            - backend
    frontend:
        image: ghcr.io/dikobrazik/squad-speak-frontend:latest
        container_name: squad-speak-frontend
        volumes:
            - /tmp/.next/cache:/usr/app/.next/cache
        env_file:
            - ./frontend.env
        networks:
            - public
        restart: always

    backend:
        image: ghcr.io/dikobrazik/squad-speak-backend:latest
        container_name: squad-speak-backend
        volumes:
            - shared-volume:/var/tmp/shared-docker
        env_file:
            - ./backend.env
        restart: always
        networks:
            - public
            - private
        depends_on:
            - db
    db:
        image: postgres:18.3-alpine
        container_name: squad-speak-db
        restart: always
        shm_size: 128mb
        ports:
            - '5432:5432'
        volumes:
            - pgdata:/var/lib/postgresql
        networks:
            - private
        environment:
            POSTGRES_PASSWORD: ${DB_PASSWORD}
volumes:
    shared-volume:
    next-images:
    pgdata:
networks:
  public:
  private:

name: Backend deployment

on:
  push:
    branches: ['main']
    paths: ['deploy/docker-compose.yaml', 'server/**']
  workflow_dispatch:
    inputs:
      reason:
        description: 'why'
        required: false
        default: 'just for fun'

env:
  BACKEND_IMAGE: ghcr.io/dikobrazik/squad-speak-backend

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.10.0'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm install -w server
      - run: npm test -w server

  build-backend:
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: 'Create env file'
        run: |
          echo "${{ secrets.ENV_BACKEND }}" > ./server/.env
          # echo "${{ secrets.DB_CA }}" > db.pem

      - name: Login to Dockerhub
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend
        uses: docker/build-push-action@v3
        with:
          context: ./server
          file: ./server/deploy/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

  update-yc:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/squad-speak &&
            docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io &&
            docker compose -f deploy/docker-compose.yaml stop backend && 
            docker compose -f deploy/docker-compose.yaml pull backend && 
            docker compose -f deploy/docker-compose.yaml up -d backend &&
            docker system prune -f

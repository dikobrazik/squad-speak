name: Nginx deployment

on:
    push:
        branches: ['main']
        paths: ['deploy/nginx/**', 'deploy/docker-compose.yaml']
    workflow_dispatch:
        inputs:
            reason:
                description: 'why'
                required: false
                default: 'just for fun'

env:
    NGINX_IMAGE: ghcr.io/dikobrazik/squad-speak-nginx

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to Dockerhub
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Nginx for together composing
              uses: docker/build-push-action@v5
              with:
                  context: ./deploy/nginx
                  file: ./deploy/nginx/Dockerfile
                  push: true
                  tags: ${{ env.NGINX_IMAGE }}

    update-yc:
        needs: [build]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Copy docker-compose
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_KEY }}
                  source: 'deploy/docker-compose.yaml'
                  target: '~/squad-speak'

            - name: executing remote ssh commands using password
              uses: appleboy/ssh-action@v1.0.0
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_KEY }}
                  script: |
                      cd ~/squad-speak && 
                      docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io &&
                      docker compose -f deploy/docker-compose.yaml stop nginx && 
                      docker compose -f deploy/docker-compose.yaml pull nginx && 
                      docker compose -f deploy/docker-compose.yaml up -d nginx &&
                      docker system prune -f
